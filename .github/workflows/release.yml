# Tagged releases: native builds for Linux (x86_64/arm64, tar.gz + .deb) and
# macOS (arm64/x86_64, tar.gz), a filled-in Homebrew formula, and a draft
# GitHub release with SHA256SUMS. Publish the draft after checking it.

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # artifact attestations (sigstore provenance)
  attestations: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$tag" != "$cargo_version" ]; then
            echo "tag v$tag != Cargo.toml $cargo_version" >&2
            exit 1
          fi

  # Full CI (tests, clippy, fmt, e2e, audits) against the tagged commit — a tag
  # on a failing/unmerged commit must not produce release artifacts.
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: [check-version, ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            deb: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            deb: arm64
          - target: aarch64-apple-darwin
            os: macos-14
          # macos-13 (the last x86_64 image) is being retired and its queue
          # starves; cross-target from the arm64 image instead.
          - target: x86_64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2

      - name: Build web client (embedded into the release binary)
        working-directory: web
        run: npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          name="remux-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/remux" README.md LICENSE packaging/remux.service "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Build .deb
        if: matrix.deb != ''
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/debian/"*.deb .

      - name: Attest build provenance
        # Attestations are only available on public repositories.
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            *.tar.gz
            *.deb

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Collect checksums and fill in the Homebrew formula
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          version="${GITHUB_REF_NAME#v}"
          sha() { grep "$1" SHA256SUMS | cut -d' ' -f1; }
          sed -e "s/{{VERSION}}/$version/g" \
              -e "s/{{SHA_MACOS_ARM64}}/$(sha aarch64-apple-darwin)/" \
              -e "s/{{SHA_MACOS_X86_64}}/$(sha x86_64-apple-darwin)/" \
              -e "s/{{SHA_LINUX_ARM64}}/$(sha aarch64-unknown-linux-gnu)/" \
              -e "s/{{SHA_LINUX_X86_64}}/$(sha x86_64-unknown-linux-gnu)/" \
              ../packaging/homebrew/remux.rb > remux.rb

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "remux $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.tar.gz dist/*.deb dist/SHA256SUMS dist/remux.rb
