name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2

      - name: Install tmux
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Build web client
        working-directory: web
        run: npm ci && npm run build

      - name: Rust tests (unit + integration, isolated tmux socket)
        run: cargo test

      - name: Browser e2e
        working-directory: web
        run: |
          npx playwright install --with-deps chromium
          npm run e2e

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # gitleaks scans full history
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dependency audit (RustSec)
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Dependency audit (npm)
        working-directory: web
        run: npm ci && npm audit --audit-level=high
