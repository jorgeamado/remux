<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="remux demo placeholder">
  <rect width="900" height="420" fill="#0d1117"/>
  <!-- desktop terminal -->
  <rect x="40" y="60" width="470" height="300" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="66" cy="86" r="6" fill="#ff5f56"/><circle cx="86" cy="86" r="6" fill="#ffbd2e"/><circle cx="106" cy="86" r="6" fill="#27c93f"/>
  <text x="66" y="140" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#7ee787">$ cargo build --release</text>
  <text x="66" y="168" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#8b949e">   Compiling remux v0.2.0</text>
  <text x="66" y="196" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#8b949e">    Finished in 42.1s</text>
  <text x="66" y="230" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#7ee787">$ remux serve --listen 100.x.y.z:7777</text>
  <text x="66" y="258" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#58a6ff">   scan the QR on your phone _</text>
  <!-- phone -->
  <rect x="600" y="40" width="200" height="340" rx="26" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="616" y="72" width="168" height="276" rx="6" fill="#0d1117"/>
  <rect x="676" y="52" width="48" height="8" rx="4" fill="#30363d"/>
  <text x="632" y="104" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#8b949e">main</text>
  <text x="632" y="150" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#7ee787">Finished in 42.1s</text>
  <text x="632" y="172" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#58a6ff">scan the QR on…</text>
  <rect x="632" y="300" width="136" height="30" rx="6" fill="#1f6feb"/>
  <text x="700" y="320" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#ffffff">Approve</text>
  <!-- caption -->
  <text x="450" y="400" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="16" fill="#6e7681">demo screenshot / GIF goes here — same session, desktop → phone</text>
</svg>
