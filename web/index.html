<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="remux" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <title>remux</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="conn-dot" class="dot"></span>
        <span id="session-name">remux</span>
        <span id="role-pill" class="pill" hidden>observer</span>
        <button id="control-btn" class="btn" hidden>Take control</button>
        <button id="menu-btn" class="btn" hidden>aA</button>
      </header>

      <div id="menu" hidden>
        <button id="font-dec" class="btn">A&minus; smaller</button>
        <button id="font-inc" class="btn">A+ larger</button>
        <button id="paste-btn" class="btn">Paste</button>
      </div>

      <main id="terminal"></main>

      <button id="hint" hidden></button>

      <footer id="keyrow" hidden>
        <button class="key" data-key="esc">esc</button>
        <button class="key" data-key="tab">tab</button>
        <button class="key" id="ctrl-key">ctrl</button>
        <button class="key" data-key="ctrl-c">^c</button>
        <button class="key" data-key="up">&#x2191;</button>
        <button class="key" data-key="down">&#x2193;</button>
        <button class="key" data-key="left">&#x2190;</button>
        <button class="key" data-key="right">&#x2192;</button>
        <button class="key" data-key="dash">-</button>
        <button class="key" data-key="pipe">|</button>
        <button class="key" data-key="slash">/</button>
      </footer>

      <div id="setup" hidden>
        <h1>remux</h1>
        <p>Your persistent tmux session, on your phone.</p>
        <p id="setup-msg">
          This device isn't paired. On the host, run <code>remux serve</code> and open the
          pairing link (or scan the QR) on this device.
        </p>
        <label for="pair-input">Or paste a pairing link / token:</label>
        <div class="row">
          <input id="pair-input" type="text" autocomplete="off" autocapitalize="off"
                 spellcheck="false" placeholder="https://host:7777/#pair=…" />
          <button id="pair-btn" class="btn">Pair</button>
        </div>
        <p id="setup-error" class="error" hidden></p>
      </div>
    </div>
  </body>
</html>
